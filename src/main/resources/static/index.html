<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk System | Bristol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cafe-dashboard-bg min-h-screen flex flex-col">

<div class="w-full h-auto bg-cover bg-center shadow-inner relative"
     style="background-image: url('images/cafe-header.jpg');">

    <div class="w-full h-full bg-black/50 py-16 md:py-24 px-6 flex items-center justify-center text-center">

        <div class="flex flex-col items-center">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-white mb-4 drop-shadow-2xl" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 8H4V4h16v4zm-2 0v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8h14zm0 0h2a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2h-2"></path>
            </svg>
            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-white tracking-tight drop-shadow-2xl">
                Kiosk Management
            </h1>
        </div>

    </div>
</div>

<div class="max-w-5xl mx-auto p-6 -mt-10 relative z-10 flex-grow w-full">

    <div class="kiosk-card p-8 mb-8">
        <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center">
            <svg class="w-6 h-6 text-blue-600 mr-2 bg-blue-100 p-1 rounded-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
            Customer Registration
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
                <input id="name" type="text" placeholder="Min 3 chars" class="input-field">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Email Address</label>
                <input id="email" type="email" placeholder="@ required" class="input-field">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Age</label>
                <input id="age" type="number" placeholder="5 - 105" class="input-field">
            </div>
            <div class="flex flex-col gap-2">
                <button id="submitBtn" onclick="handleSubmit()" class="btn-primary">
                    Add Customer
                </button>
                <button id="cancelBtn" onclick="resetForm()" class="hidden text-red-500 text-xs font-bold uppercase tracking-wider hover:text-red-700 text-center transition-all">
                    Cancel Edit
                </button>
            </div>
        </div>
    </div>

    <div class="kiosk-card overflow-hidden mb-20">

        <div class="p-4 border-b border-gray-100 bg-white/40 flex flex-col md:flex-row justify-between items-center gap-4">

            <div class="relative w-full md:w-72">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                <input type="text" id="searchInput" onkeyup="filterCustomers()"
                       placeholder="Search name or email..."
                       class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-200 outline-none bg-white/60">
            </div>

            <div class="flex items-center gap-4">
                    <span id="customerCount" class="text-xs font-bold text-gray-500 uppercase tracking-wide">
                        0 Active Records
                    </span>
                <button onclick="toggleStats()" class="text-xs font-bold text-blue-600 hover:text-blue-800 uppercase flex items-center gap-1 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    More Info
                </button>
            </div>
        </div>

        <div id="statsPanel" class="hidden bg-white/40 p-6 border-b border-gray-100 text-gray-700 grid grid-cols-2 gap-4 backdrop-blur-md">
            <div class="border-r border-gray-100">
                <p class="text-gray-500 uppercase text-[10px] font-bold tracking-widest mb-1">Total Customers</p>
                <p id="totalStat" class="text-2xl font-black text-blue-600">0</p>
            </div>
            <div>
                <p class="text-gray-500 uppercase text-[10px] font-bold tracking-widest mb-1">Average Age</p>
                <p id="avgAgeStat" class="text-2xl font-black text-blue-600">0</p>
            </div>
        </div>

        <div class="overflow-x-auto rounded-b-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50/80 border-b border-gray-100">
                <tr>
                    <th class="p-5 text-xs font-bold text-gray-400 uppercase">ID</th>
                    <th class="p-5 text-xs font-bold text-gray-400 uppercase">Customer</th>
                    <th class="p-5 text-xs font-bold text-gray-400 uppercase">Email</th>
                    <th class="p-5 text-xs font-bold text-gray-400 uppercase text-center">Age</th>
                    <th class="p-5 text-xs font-bold text-gray-400 uppercase text-center">Actions</th>
                </tr>
                </thead>
                <tbody id="customerTableBody" class="divide-y divide-gray-50">
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="fixed bottom-6 right-6 z-50">
    <div class="browser-safe-special-font bg-white/50 px-5 py-2 rounded-full backdrop-blur-md border border-white/30 shadow-lg text-gray-600 text-sm">
        Built in Bristol
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
