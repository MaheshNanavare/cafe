<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Customer Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Cafe Customer List</h1>

    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input id="name" type="text" placeholder="Name" class="border p-2 rounded w-full">
            <input id="email" type="email" placeholder="Email" class="border p-2 rounded w-full">
            <input id="age" type="number" placeholder="Age" class="border p-2 rounded w-full">
            <button onclick="addCustomer()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Add Customer</button>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-200">
            <tr>
                <th class="p-4 border-b">ID</th>
                <th class="p-4 border-b">Name</th>
                <th class="p-4 border-b">Email</th>
                <th class="p-4 border-b">Age</th>
                <th class="p-4 border-b">Action</th>
            </tr>
            </thead>
            <tbody id="customerTableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
