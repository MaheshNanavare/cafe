<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Customer Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Cafe Customer List</h1>

    <!-- Form Section -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input id="name" type="text" placeholder="John Doe" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="john@example.com" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                <input id="age" type="number" placeholder="25" class="border p-2 rounded w-full focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div class="flex flex-col gap-2">
                <!-- Changed onclick to handleSubmit() -->
                <button id="submitBtn" onclick="handleSubmit()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition font-medium">
                    Add Customer
                </button>
                <!-- Hidden by default, shown during Edit Mode via JS -->
                <button id="cancelBtn" onclick="resetForm()" class="hidden text-gray-500 text-sm hover:underline">
                    Cancel Edit
                </button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-gray-200">
            <tr>
                <th class="p-4 border-b font-semibold text-gray-700">ID</th>
                <th class="p-4 border-b font-semibold text-gray-700">Name</th>
                <th class="p-4 border-b font-semibold text-gray-700">Email</th>
                <th class="p-4 border-b font-semibold text-gray-700">Age</th>
                <th class="p-4 border-b font-semibold text-gray-700 text-center">Actions</th>
            </tr>
            </thead>
            <tbody id="customerTableBody">
            <!-- Rows injected by script.js -->
            </tbody>
        </table>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
